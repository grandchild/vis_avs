stages:
  - prepare
  - build


build-ci-image:
  image: docker
  stage: prepare
  services:
    - name: docker:dind
      alias: docker
  script:
    - cd .ci
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/ci-build:${CI_COMMIT_TIMESTAMP//[:+]/_}-$CI_COMMIT_SHORT_SHA .
  rules:
    - # if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        paths:
          - .ci/Dockerfile
        compare_to: $CI_DEFAULT_BRANCH


.build: &build_base
  image: $CI_REGISTRY_IMAGE/ci-build
  stage: build
  cache:
    paths:
      - build_*

Windows32:
  <<: *build_base
  script:
    - .ci/tasks.sh build-win32
  artifacts:
    paths:
      - build_win32/*.dll

Linux32:
  <<: *build_base
  script:
    - .ci/tasks.sh build-linux32
  artifacts:
    paths:
      - build_linux32/*.so
      - build_linux32/avs
