stages:
  - prepare
  - build

build-ci-image:
  image: docker
  stage: prepare
  script:
    - cd .ci
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/ci-build:$CI_COMMIT_TIMESTAMP-$CI_COMMIT_SHORT_SHA .
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        paths:
          - .ci/Dockerfile
        compare_to: main

build:
  image: $CI_REGISTRY_IMAGE/ci-build
  stage: build
  # before_script:
  #   - .ci/tasks.sh install-deps archlinux
  script:
    - .ci/tasks.sh build-win32
    - .ci/tasks.sh build-linux32
  artifacts:
    paths:
      - build_win32/vis_avs.dll
      - build_win32/libavs.dll
      - build_linux32/libavs.so
  cache:
    paths:
      - build_win32/
      - build_linux32/
